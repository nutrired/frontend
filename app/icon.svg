<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Avocado outer skin (dark green) -->
  <ellipse cx="16" cy="17" rx="10" ry="12" fill="#3a5b3f"/>

  <!-- Avocado flesh (light green/yellow) -->
  <ellipse cx="16" cy="17" rx="7.5" ry="9" fill="#b8d4a0"/>

  <!-- Avocado pit (brown) -->
  <ellipse cx="16" cy="17" rx="4" ry="5" fill="#6b4423"/>

  <!-- Pit highlight -->
  <ellipse cx="15" cy="15.5" rx="1.5" ry="2" fill="#8b6334" opacity="0.6"/>

  <!-- Stem (brown) -->
  <rect x="15" y="5" width="2" height="4" rx="1" fill="#6b4423"/>

  <!-- Leaf (green) -->
  <path d="M 18 5 Q 22 4 23 7 Q 22 8 20 8 Q 19 7 18 6 Z" fill="#4a7c59"/>
</svg>
